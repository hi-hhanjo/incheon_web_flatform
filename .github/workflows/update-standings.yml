name: 주간 순위표 갱신

# 주 2회(월·목 06:00 KST) 다음 스포츠 순위 API를 크롤링해
# data/standings.json + data/standings-history/<날짜>.json 를 갱신하고 커밋한다.
# (주말 경기뿐 아니라 주중 경기도 있어 월·목 두 번 갱신.)
on:
  schedule:
    - cron: "0 21 * * 0" # 일 21:00 UTC = 월 06:00 KST
    - cron: "0 21 * * 3" # 수 21:00 UTC = 목 06:00 KST
  workflow_dispatch: {} # 수동 실행도 허용

permissions:
  contents: write # 갱신된 데이터 파일을 되커밋하기 위해 필요

jobs:
  update-standings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 크롤러 의존성 설치
        run: pip install -r scraper/requirements.txt

      - name: 순위표 크롤링 (standings.json + 이력 파일 갱신)
        working-directory: scraper
        run: python export_standings.py

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json data/standings-history/
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 순위표 주간 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
