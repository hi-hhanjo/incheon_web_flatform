name: 일간 K리그 데이터 갱신

# 매일 06:00 KST 다음 스포츠 공개 API를 크롤링해 구단 데이터를 갱신·커밋한다.
# - 순위표(+수집일별 이력) / 인천 경기 일정·결과 / K리그1 12팀 최근 폼 / 상대전적(최근 5시즌)
# (경기 다음 날 아침에 결과가 바로 반영되도록 매일 갱신. 수집일별 이력 스냅샷이 매일 새로 쌓여
#  순위 무변동일에도 대체로 커밋·재배포가 일어난다 — CRAWLER_SPEC.md 5절. 같은 날 재실행 등
#  변경분이 전혀 없을 때만 아래 git diff 가드로 커밋을 생략한다.)
# 응원가 크롤러(export_chant_candidates 등)는 여기 없다 — 1년에 몇 곡 수준이라 수동 실행한다
# (CRAWLER_SPEC.md 3.7.3).
on:
  schedule:
    - cron: "0 21 * * *" # 매일 21:00 UTC = 06:00 KST
  workflow_dispatch: {} # 수동 실행도 허용

permissions:
  contents: write # 갱신된 데이터 파일을 되커밋하기 위해 필요

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 크롤러 의존성 설치
        run: pip install -r scraper/requirements.txt

      - name: 크롤링 (순위표 · 경기 · 상대 폼 · 상대전적 · 스카우팅)
        working-directory: scraper
        run: |
          python export_standings.py
          python export_matches.py
          python export_opponent_forms.py
          python export_head_to_head.py
          python export_scouting.py

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json data/standings-meta.json data/standings-history/ \
                  data/matches.json data/matches-meta.json \
                  data/opponent-forms.json data/opponent-forms-meta.json \
                  data/head-to-head.json data/head-to-head-meta.json \
                  data/opponent-scouting.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: K리그 데이터 일간 갱신 ($(date -u +%Y-%m-%d))"
            git push
            
            # Vercel 재배포 트리거 (GitHub 봇의 푸시는 웹훅을 발생시키지 않으므로 수동 호출 필요)
            if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
              curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
              echo "Vercel Deploy Hook 호출 완료"
            else
              echo "VERCEL_DEPLOY_HOOK 시크릿이 설정되지 않아 배포 트리거를 생략합니다."
            fi
          fi
